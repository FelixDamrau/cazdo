name: CI

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust toolchain
        run: rustup show

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Set up Rust cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: Build
        run: just build-ci

      - name: Run tests
        run: just test-ci

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust toolchain
        run: rustup show

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Check Formatting
        run: just fmt-check

      - name: Run Clippy
        run: just clippy-ci

  release-tooling:
    name: Release Tooling
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Verify changelog generation
        run: just verify-changelog

      - name: Verify release note extraction
        run: just extract-notes

      - name: Verify release PR metadata when version changes
        run: just check-release-pr "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

  check-release-pipeline:
    name: Check Release Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Read dist version
        id: dist-version
        run: |
          version=$(python -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('dist-workspace.toml').read_text())['dist']['cargo-dist-version'])")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Cache dist
        id: cache-dist
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/dist
          key: cargo-dist-${{ runner.os }}-${{ steps.dist-version.outputs.version }}

      - name: Install dist
        if: steps.cache-dist.outputs.cache-hit != 'true'
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v${{ steps.dist-version.outputs.version }}/cargo-dist-installer.sh | sh"

      - name: Verify release.yml is up to date
        shell: bash
        run: just verify-release-yml

      - name: Verify built-in updater release artifacts
        shell: bash
        run: |
          dist plan --output-format=json > dist-plan.json
          jq -e '([.artifacts[] | select(.kind == "updater")] | length) == 0' dist-plan.json
          jq -e '.artifacts["cazdo-installer.sh"].kind == "installer"' dist-plan.json
          jq -e '.artifacts["cazdo-installer.ps1"].kind == "installer"' dist-plan.json

          dist build --artifacts=global --output-format=json > dist-build.json
          grep -F '$APP_NAME-receipt.json' target/distrib/cazdo-installer.sh
          grep -F 'cazdo-receipt.json' target/distrib/cazdo-installer.ps1
          if grep -Eq 'cazdo-(aarch64|x86_64).*-update' target/distrib/cazdo-installer.sh target/distrib/cazdo-installer.ps1; then
            echo "Generated installers still reference standalone updater artifacts"
            exit 1
          fi
